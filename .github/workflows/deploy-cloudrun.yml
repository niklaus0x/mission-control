name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker

      - name: Build and push image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/mission-control:${{ github.sha }} \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/mission-control:latest .
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/mission-control:${{ github.sha }}
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/mission-control:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy mission-control \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/mission-control:${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --port 3000 \
            --set-env-vars NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }},NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
            --project ${{ secrets.GCP_PROJECT_ID }}
